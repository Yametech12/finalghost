name: Deploy Firebase Rules

on:
  push:
    branches:
      - master
    paths:
      - '**.rules'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set CORS on Storage
        run: gsutil cors set cors.json gs://${{ secrets.FIREBASE_BUCKET }}.appspot.com

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore --project=${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Deploy Storage Rules
        run: firebase deploy --only storage --project=${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}